<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Playground</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #1a1a2e; --bg-medium: #16213e; --accent: #e94560; --text: #eee; --text-dim: #aaa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; }
        
        /* Layout */
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: var(--bg-medium); border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 16px; z-index: 1000; gap: 10px; }
        .sidebar { position: fixed; top: 50px; left: 0; width: 260px; height: calc(100vh - 50px); background: var(--bg-medium); border-right: 1px solid #333; overflow-y: auto; padding: 16px; }
        .canvas-container { position: fixed; top: 50px; left: 260px; right: 0; bottom: 0; overflow: hidden; background: radial-gradient(circle, #2a2a40 1px, transparent 1px); background-size: 30px 30px; cursor: crosshair; }
        .canvas { position: absolute; transform-origin: 0 0; }
        
        /* UI Elements */
        .canvas-element { position: absolute; width: 180px; padding: 15px; border-radius: 8px; cursor: move; background: #252545; border: 1px solid #444; z-index: 10; user-select: none; }
        .canvas-element.selected { border: 2px solid var(--accent); }
        .connect-handle { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: crosshair; }
        
        /* Utilities */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px 20px; border-radius: 5px; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div class="topbar">
        <strong>Strategy Playground</strong>
        <button onclick="saveAll()">Save</button>
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomOut()">-</button>
    </div>

    <div class="sidebar">
        <h3>Elements</h3>
        <div class="palette-item" draggable="true" ondragstart="handleDragStart(event, 'sticky')">📝 Sticky</div>
        <div class="palette-item" draggable="true" ondragstart="handleDragStart(event, 'funnel')">🔻 Funnel</div>
        <div class="palette-item" draggable="true" ondragstart="handleDragStart(event, 'strategy')">🎯 Strategy</div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="canvas" id="canvas">
            <svg id="connectionsSvg" style="position:absolute; top:0; left:0; width:10000px; height:10000px; pointer-events:none;"></svg>
        </div>
    </div>

    <div id="toast" class="toast">Saved!</div>

<script>
    let state = { elements: {}, connections: [], zoom: 1, panX: 0, panY: 0 };
    let isDragging = false, isPanning = false, isConnecting = false;
    let selectedId = null, dragOffset = {x:0, y:0}, connectionStart = null;

    // --- Core Logic ---
    function init() {
        const saved = localStorage.getItem('playground');
        if (saved) state = JSON.parse(saved);
        render();
    }

    function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '<svg id="connectionsSvg" style="position:absolute; pointer-events:none;"></svg>';
        Object.entries(state.elements).forEach(([id, el]) => {
            const div = document.createElement('div');
            div.className = 'canvas-element';
            div.id = id;
            div.style.left = el.x + 'px';
            div.style.top = el.y + 'px';
            div.innerText = el.content;
            div.onmousedown = (e) => startDrag(e, id);
            canvas.appendChild(div);
        });
        updateConnections();
    }

    function startDrag(e, id) {
        isDragging = true;
        selectedId = id;
        const el = state.elements[id];
        dragOffset = { x: e.clientX - el.x, y: e.clientY - el.y };
    }

    function handleDragStart(e, type) {
        e.dataTransfer.setData("type", type);
    }

    document.getElementById('canvasContainer').addEventListener('drop', (e) => {
        e.preventDefault();
        const type = e.dataTransfer.getData("type");
        const x = (e.clientX - 260 - state.panX) / state.zoom;
        const y = (e.clientY - 50 - state.panY) / state.zoom;
        const id = 'el_' + Date.now();
        state.elements[id] = { type, x, y, content: 'New ' + type };
        render();
    });

    document.getElementById('canvasContainer').addEventListener('dragover', (e) => e.preventDefault());

    window.onmousemove = (e) => {
        if (isDragging && selectedId) {
            state.elements[selectedId].x = (e.clientX - 260) / state.zoom - (dragOffset.x / state.zoom) + (state.panX / state.zoom);
            state.elements[selectedId].y = (e.clientY - 50) / state.zoom - (dragOffset.y / state.zoom) + (state.panY / state.zoom);
            document.getElementById(selectedId).style.left = state.elements[selectedId].x + 'px';
            document.getElementById(selectedId).style.top = state.elements[selectedId].y + 'px';
            updateConnections();
        }
    };

    window.onmouseup = () => { isDragging = false; selectedId = null; };

    function updateConnections() {
        const svg = document.getElementById('connectionsSvg');
        // Logic to draw lines goes here
    }

    function saveAll() {
        localStorage.setItem('playground', JSON.stringify(state));
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function zoomIn() { state.zoom += 0.1; document.getElementById('canvas').style.transform = `scale(${state.zoom})`; }
    function zoomOut() { state.zoom -= 0.1; document.getElementById('canvas').style.transform = `scale(${state.zoom})`; }

    init();
</script>
</body>
</html>
